name: Main Branch Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Environment variables available to all steps including secrets.py
    env:
      OTA_SERVER: ${{ secrets.OTA_SERVER }}
      VERSION_CHECK_ENDPOINT: ${{ secrets.VERSION_CHECK_ENDPOINT }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Cache PlatformIO
      uses: actions/cache@v3
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-${{ hashFiles('**/lockfiles') }}
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade platformio
        
    - name: Install dependencies
      run: |
        pio lib install
        
    - name: Build firmware
      run: |
        pio run
        
    - name: Extract version information
      id: version
      run: |
        VERSION=$(grep -r 'FIRMWARE_VERSION' platformio.ini | sed 's/.*"\(.*\)".*/\1/')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Firmware version: $VERSION"
        
    - name: Generate firmware filename
      id: filename
      run: |
        FILENAME="esp32_ota_v${{ steps.version.outputs.version }}.bin"
        echo "filename=$FILENAME" >> $GITHUB_OUTPUT
        echo "Firmware filename: $FILENAME"
        
    - name: Copy firmware with version name
      run: |
        cp .pio/build/esp32dev/firmware.bin ${{ steps.filename.outputs.filename }}
        
    - name: Configure AWS credentials
      if: github.event_name == 'push'
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
        
    - name: Upload firmware to S3
      if: github.event_name == 'push'
      run: |
        aws s3 cp ${{ steps.filename.outputs.filename }} s3://${{ secrets.AWS_S3_BUCKET }}/firmware/
        echo "Firmware uploaded to S3: s3://${{ secrets.AWS_S3_BUCKET }}/firmware/${{ steps.filename.outputs.filename }}"
        
    - name: Update version.json
      if: github.event_name == 'push'
      run: |
        python3 << 'EOF'
        import json
        import datetime
        import os
        
        # Get environment variables and clean them
        version = os.environ.get('VERSION', '').replace('\\', '').replace('"', '')
        bucket = os.environ.get('AWS_S3_BUCKET', '').replace('\\', '')
        filename = os.environ.get('FILENAME', '').replace('\\', '')
        sha = os.environ.get('GITHUB_SHA', '').replace('\\', '')
        
        data = {
            "version": version,
            "firmware_url": f"https://{bucket}.s3.amazonaws.com/firmware/{filename}",
            "release_notes": f"Automated release from commit {sha}",
            "required": False,
            "released_at": datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
        }
        with open('version.json', 'w') as f:
            json.dump(data, f, indent=2)
        EOF
      env:
        VERSION: ${{ steps.version.outputs.version }}
        AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        FILENAME: ${{ steps.filename.outputs.filename }}
        GITHUB_SHA: ${{ github.sha }}
        
    - name: Upload version.json to S3
      if: github.event_name == 'push'
      run: |
        aws s3 cp version.json s3://${{ secrets.AWS_S3_BUCKET }}/
        echo "Version file uploaded to S3: s3://${{ secrets.AWS_S3_BUCKET }}/version.json"
        
    - name: Generate deployment report
      run: |
        echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Status**: Success" >> $GITHUB_STEP_SUMMARY
        if [ "${{ github.event_name }}" == "push" ]; then
          echo "- **Deployment Status**: Completed" >> $GITHUB_STEP_SUMMARY
          echo "- **Version URL**: https://${{ secrets.AWS_S3_BUCKET }}.s3.amazonaws.com/version.json" >> $GITHUB_STEP_SUMMARY
        else
          echo "- **Deployment Status**: Skipped (Pull Request)" >> $GITHUB_STEP_SUMMARY
        fi
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-main
        path: |
          ${{ steps.filename.outputs.filename }}
          version.json
        retention-days: 30
        
    
