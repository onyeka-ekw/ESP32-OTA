name: Main Branch Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Cache PlatformIO
      uses: actions/cache@v3
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-${{ hashFiles('**/lockfiles') }}
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade platformio
        
    - name: Install dependencies
      run: |
        pio lib install
        
    - name: Build firmware
      run: |
        pio run
        
    - name: Extract version information
      id: version
      run: |
        VERSION=$(grep -r 'FIRMWARE_VERSION' platformio.ini | sed 's/.*"\(.*\)".*/\1/')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Firmware version: $VERSION"
        
    - name: Generate firmware filename
      id: filename
      run: |
        FILENAME="esp32_ota_v${{ steps.version.outputs.version }}.bin"
        echo "filename=$FILENAME" >> $GITHUB_OUTPUT
        echo "Firmware filename: $FILENAME"
        
    - name: Copy firmware with version name
      run: |
        cp .pio/build/esp32dev/firmware.bin ${{ steps.filename.outputs.filename }}
        
    - name: Configure AWS credentials
      if: github.event_name == 'push'
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
        
    - name: Upload firmware to S3
      if: github.event_name == 'push'
      run: |
        aws s3 cp ${{ steps.filename.outputs.filename }} s3://${{ secrets.AWS_S3_BUCKET }}/firmware/
        echo "Firmware uploaded to S3: s3://${{ secrets.AWS_S3_BUCKET }}/firmware/${{ steps.filename.outputs.filename }}"
        
    - name: Update version.json
      if: github.event_name == 'push'
      run: |
        cat > version.json << EOF
        {
          "version": "${{ steps.version.outputs.version }}",
          "firmware_url": "https://${{ secrets.AWS_S3_BUCKET }}.s3.amazonaws.com/firmware/${{ steps.filename.outputs.filename }}",
          "release_notes": "Automated release from commit ${{ github.sha }}",
          "required": false,
          "released_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        }
        EOF
        
    - name: Upload version.json to S3
      if: github.event_name == 'push'
      run: |
        aws s3 cp version.json s3://${{ secrets.AWS_S3_BUCKET }}/
        echo "Version file uploaded to S3: s3://${{ secrets.AWS_S3_BUCKET }}/version.json"
        
    - name: Generate deployment report
      run: |
        echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Firmware Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Status**: Success" >> $GITHUB_STEP_SUMMARY
        if [ "${{ github.event_name }}" == "push" ]; then
          echo "- **Deployment Status**: Completed" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 Location**: s3://${{ secrets.AWS_S3_BUCKET }}/firmware/${{ steps.filename.outputs.filename }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version URL**: https://${{ secrets.AWS_S3_BUCKET }}.s3.amazonaws.com/version.json" >> $GITHUB_STEP_SUMMARY
        else
          echo "- **Deployment Status**: Skipped (Pull Request)" >> $GITHUB_STEP_SUMMARY
        fi
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-main
        path: |
          ${{ steps.filename.outputs.filename }}
          version.json
        retention-days: 30
        
    - name: Create GitHub Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: ESP32 OTA Firmware v${{ steps.version.outputs.version }}
        body: |
          ## ESP32 OTA Firmware v${{ steps.version.outputs.version }}
          
          ### Changes
          - Automated release from commit ${{ github.sha }}
          - Firmware uploaded to S3 bucket
          - Version information updated
          
          ### Download
          - **Firmware**: [${{ steps.filename.outputs.filename }}](https://${{ secrets.AWS_S3_BUCKET }}.s3.amazonaws.com/firmware/${{ steps.filename.outputs.filename }})
          - **Version Info**: [version.json](https://${{ secrets.AWS_S3_BUCKET }}.s3.amazonaws.com/version.json)
          
          ### Installation
          1. Download the firmware file
          2. Flash to ESP32 using esptool or PlatformIO
          3. Device will automatically check for updates on startup
        draft: false
        prerelease: false
        files: |
          ${{ steps.filename.outputs.filename }}
          version.json
