[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; OTA Configuration
board_build.partitions = huge_app.csv
board_build.arduino.ldscript = esp32_out.ld

; Library dependencies
lib_deps = 
    ArduinoJson@6.21.3
    WiFi@2.0.0
    HTTPClient@2.0.0
    Update@1.0.0

; Build flags for OTA
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_OTA_UPDATE
    -DFIRMWARE_VERSION=\"1.0.0\"
