[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Load environment variables from .env file (secure)
extra_scripts = 
    pre:secrets.py

; OTA Configuration - using default partitions

; Library dependencies
lib_deps = 
    ArduinoJson@6.21.3
    WiFi@2.0.0
    HTTPClient@2.0.0

; Build flags for OTA
build_flags = 
    -DCORE_DEBUG_LEVEL=3
